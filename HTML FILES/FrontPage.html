<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NariDhan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100%;
            background: url('Images/img.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            margin-left: 40px;
            color: white;
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            color: white;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #ccc;
            margin-bottom: 30px;
        }

        .buttons {
            margin-top: 20px;
        }

        .btn {
            font-size: 1.3rem;
            font-weight: 700;
            padding: 15px 50px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-login {
            background: #4CAF50;
            color: #fff;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        .btn-login:hover {
            background: #45a049;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.5);
        }

        .btn-register {
            background: #673AB7;
            color: #fff;
            box-shadow: 0 4px 10px rgba(103, 58, 183, 0.3);
        }

        .btn-register:hover {
            background: #5E35B1;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(103, 58, 183, 0.5);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title">NariDhan</div>
        <div class="subtitle">Unlocking Financial Empowerment with AI</div>
        <div class="buttons">
            <a href="FinancialHub.html"><button class="btn btn-login">Login</button></a>
            <a href="register.html"><button class="btn btn-register">Register</button></a>
        </div>
    </div>

</body>

</html>
